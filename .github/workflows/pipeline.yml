name: CI Pipeline

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # Job 1 : LINT — style du code
  # ─────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: PHP lint (syntax check)
        run: find worldcup-backend/src -name "*.php" | xargs php -l

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: worldcup-frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: worldcup-frontend
        run: npm ci

      - name: ESLint frontend
        working-directory: worldcup-frontend
        run: npm run lint

  # ─────────────────────────────────────────
  # Job 2 : TEST — PHPUnit multi-versions PHP
  # ─────────────────────────────────────────
  test:
    name: Tests (PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      matrix:
        php-version: ['8.1', '8.2', '8.3']

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: worldcup2026_test
          MYSQL_USER: worldcup_user
          MYSQL_PASSWORD: Wc2026_Secure!Pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: pdo, pdo_mysql, intl, mbstring
          coverage: none

      - name: Install Composer dependencies
        working-directory: worldcup-backend
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Setup test database
        working-directory: worldcup-backend
        env:
          APP_ENV: test
          DATABASE_URL: "mysql://worldcup_user:Wc2026_Secure!Pass@127.0.0.1:3306/worldcup2026_test?serverVersion=8.0.32&charset=utf8mb4"
        run: |
          php bin/console doctrine:database:create --env=test --if-not-exists
          php bin/console doctrine:migrations:migrate --env=test --no-interaction
          php bin/console doctrine:fixtures:load --env=test --no-interaction

      - name: Run PHPUnit tests
        working-directory: worldcup-backend
        env:
          APP_ENV: test
          APP_SECRET: ${{ secrets.APP_SECRET }}
          DATABASE_URL: "mysql://worldcup_user:Wc2026_Secure!Pass@127.0.0.1:3306/worldcup2026_test?serverVersion=8.0.32&charset=utf8mb4"
        run: php bin/phpunit --testdox

  # ─────────────────────────────────────────
  # Job 3 : BUILD — docker build multi-stage
  # ─────────────────────────────────────────
  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./worldcup-backend
          push: false
          tags: ghcr.io/${{ github.repository_owner }}/worldcup-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./worldcup-frontend
          push: false
          tags: ghcr.io/${{ github.repository_owner }}/worldcup-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # Job 4 : PUSH IMAGE — GitHub Container Registry
  # ─────────────────────────────────────────
  push-image:
    name: Push to ghcr.io
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./worldcup-backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/worldcup-backend:latest
            ghcr.io/${{ github.repository_owner }}/worldcup-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./worldcup-frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/worldcup-frontend:latest
            ghcr.io/${{ github.repository_owner }}/worldcup-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
