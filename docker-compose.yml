services:

  # ── Base de données ──────────────────────
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: worldcup2026
      MYSQL_USER: worldcup_user
      MYSQL_PASSWORD: Wc2026_Secure!Pass
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend Symfony (PHP-FPM) ────────────
  backend:
    build:
      context: ./worldcup-backend
      target: production
    environment:
      APP_ENV: dev
      APP_SECRET: ${APP_SECRET:-myAppSecret}
      DATABASE_URL: "mysql://worldcup_user:Wc2026_Secure!Pass@mysql:3306/worldcup2026?serverVersion=8.0.32&charset=utf8mb4"
      CORS_ALLOW_ORIGIN: '^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$'
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./worldcup-backend:/app
      - /app/vendor

  # ── Nginx — proxy vers PHP-FPM ──────────
  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./worldcup-backend:/app
      - ./worldcup-backend/docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

  # ── Frontend React ───────────────────────
  frontend:
    build:
      context: ./worldcup-frontend
      target: production
    ports:
      - "80:80"
    environment:
      VITE_API_URL: http://localhost:8000/api

volumes:
  mysql_data:
